<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Logout</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at 15% 20%, rgba(155, 92, 255, 0.18), transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(0, 245, 255, 0.18), transparent 45%),
                linear-gradient(120deg, #0b0b1a, #14142e, #0b0b1a);
            background-size: 200% 200%;
            animation: bgFlow 20s ease infinite;
            color: #eaeaff;
            overflow: hidden;
        }

        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logout-card {
            position: relative;
            width: 400px;
            padding: 50px 40px;
            background: rgba(21, 21, 40, 0.88);
            border-radius: 24px;
            border: 1px solid rgba(155, 92, 255, 0.25);
            box-shadow: 0 0 35px rgba(0, 245, 255, 0.25);
            backdrop-filter: blur(12px);
            z-index: 2;
            animation: cardPulse 6s ease-in-out infinite;
            text-align: center;
        }

        @keyframes cardPulse {
            0%, 100% { box-shadow: 0 0 25px rgba(155, 92, 255, 0.2); }
            50% { box-shadow: 0 0 50px rgba(0, 245, 255, 0.35); }
        }

        .logout-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            background: linear-gradient(90deg, #00f5ff, #9b5cff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            color: #b8b8ff;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-direction: column;
        }

        button, .btn-cancel {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
        }

        button {
            background: linear-gradient(90deg, #00f5ff, #9b5cff);
            color: #0b0b1a;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px rgba(0, 245, 255, 0.7);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #eaeaff;
            border: 1px solid rgba(0, 245, 255, 0.4);
        }

        .btn-cancel:hover {
            background: rgba(0, 245, 255, 0.15);
        }
    </style>
</head>

<body>

<div class="logout-card">
    <div class="logout-icon">⚠️</div>
    <h2>Confirm Logout</h2>
    <p>Are you sure you want to log out? You will need to log in again to access your account.</p>
    
    <form method="post" style="display: contents;">
        {% csrf_token %}
        <div class="button-group">
            <button type="submit">Yes, Logout</button>
            <a href="/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
