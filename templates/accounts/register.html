<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeNova | Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Orbitron:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at 15% 20%, rgba(155,92,255,.18), transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(0,245,255,.18), transparent 45%),
        linear-gradient(120deg,#0b0b1a,#14142e,#0b0b1a);
    background-size:200% 200%;
    animation:bgFlow 20s ease infinite;
    color:#eaeaff;
    overflow:hidden;
}

@keyframes bgFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating orbs */
.orb{
    position:absolute;
    width:180px;
    height:180px;
    background:radial-gradient(circle, rgba(0,245,255,.35), transparent 70%);
    filter:blur(45px);
    animation:orbMove 22s infinite alternate ease-in-out;
}
.orb.purple{
    background:radial-gradient(circle, rgba(155,92,255,.4), transparent 70%);
    animation-duration:28s;
}

@keyframes orbMove{
    from{transform:translate(-30px,-20px);}
    to{transform:translate(30px,20px);}
}

/* Floating code in background */
.code-bg span{
    position:absolute;
    font-family:'JetBrains Mono',monospace;
    color:rgba(0,245,255,.12);
    font-size:14px;
    animation:float 18s linear infinite;
}
@keyframes float{
    from{transform:translateY(110vh);opacity:0;}
    to{transform:translateY(-120vh);opacity:1;}
}

/* Register card */
.register-card{
    position:relative;
    width:500px;
    padding:45px;
    background:rgba(21,21,40,.88);
    border-radius:26px;
    border:1px solid rgba(155,92,255,.25);
    box-shadow:0 0 45px rgba(0,245,255,.25);
    backdrop-filter:blur(12px);
    z-index:2;
    animation:cardPulse 6s ease-in-out infinite;
}

@keyframes cardPulse{
    0%,100%{box-shadow:0 0 25px rgba(155,92,255,.2);}
    50%{box-shadow:0 0 50px rgba(0,245,255,.35);}
}

/* Heading with typing */
h2{
    text-align:center;
    font-family:'Orbitron',sans-serif;
    font-size:28px;
    background:linear-gradient(90deg,#00f5ff,#9b5cff);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:25px;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(155,92,255,.4);
    background:#0f0f1a;
    color:#eaeaff;
    outline:none;
    margin-bottom:15px;
    transition:0.3s;
}
input:focus{
    box-shadow:0 0 0 2px rgba(0,245,255,.6);
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#9b5cff,#00f5ff);
    color:#0f0f1a;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 35px rgba(0,245,255,.8);
}

/* Login link text */
.login-text{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#b8b8ff;
}
.login-text a{
    color:#00f5ff;
    font-weight:500;
    text-decoration:none;
}
.login-text a:hover{
    text-shadow:0 0 10px #00f5ff;
}

/* Responsive */
@media(max-width:420px){
    .register-card{width:90%;padding:35px;}
    h2{font-size:24px;}
}
</style>
</head>

<body>

<!-- Orbs -->
<div class="orb" style="top:10%;left:15%"></div>
<div class="orb purple" style="bottom:15%;right:10%"></div>

<!-- Floating code background -->
<div class="code-bg">
    <span style="left:10%">if(user){register()}</span>
    <span style="left:30%">function signup()</span>
    <span style="left:55%">console.log()</span>
    <span style="left:75%">while(true){learn()}</span>
</div>

<div class="register-card">
    <h2 id="typing"></h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <p class="login-text">
        Already have an account? <a href="{% url 'login' %}">Login</a>
    </p>
</div>

<script>
/* Typing effect */
const text="Register to CodeNova";
let i=0;
function type(){
 if(i<text.length){
  document.getElementById("typing").innerHTML+=text.charAt(i);
  i++;
  setTimeout(type,80);
 }
}
window.onload=type;

/* Floating code spans random positions & duration */
document.querySelectorAll(".code-bg span").forEach(el=>{
    el.style.left = Math.random()*100 + "%";
    el.style.animationDuration = 15 + Math.random()*10 + "s";
});
</script>

</body>
</html>
