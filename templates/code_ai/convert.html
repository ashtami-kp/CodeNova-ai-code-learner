<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodeNova | Code Converter</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Fira+Code&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a1a40, #0f0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            color: #eaeaff;
        }

        .converter-card {
            width: 720px;
            padding: 40px;
            background: rgba(20, 20, 45, 0.9);
            border-radius: 26px;
            border: 1px solid rgba(155, 92, 255, 0.35);
            box-shadow: 0 0 45px rgba(0, 245, 255, 0.25);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00f5ff, #9b5cff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #b8b8ff;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(155, 92, 255, 0.4);
            background: #0f0f1a;
            color: #eaeaff;
            font-family: 'Fira Code', monospace;
            outline: none;
            margin-bottom: 18px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            box-shadow: 0 0 0 2px rgba(0, 245, 255, 0.6);
        }

        textarea {
            resize: vertical;
            min-height: 160px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #9b5cff, #00f5ff);
            color: #0f0f1a;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.8);
        }

        .output {
            margin-top: 35px;
        }

        .output h3 {
            margin-bottom: 10px;
            color: #00f5ff;
            font-size: 18px;
        }

        pre {
            background: #0f0f1a;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid rgba(0, 245, 255, 0.35);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            overflow-x: auto;
            color: #eaeaff;
        }
    </style>
</head>

<body>

<div class="converter-card">
    <h2>Code Language Converter</h2>

    <form method="post">
        {% csrf_token %}

        <label>From Language</label>
        <input type="text" name="from_lang" placeholder="Python" required>

        <label>To Language</label>
        <input type="text" name="to_lang" placeholder="C / Java / JS" required>

        <label>Source Code</label>
        <textarea name="code" placeholder="Enter your code here..." required></textarea>

        <button type="submit">Convert Code</button>
    </form>

    {% if result %}
    <div class="output">
        <h3>Converted Output</h3>
        <pre>{{ result }}</pre>
    </div>
    {% endif %}
</div>

</body>
</html>
