<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodeNova | Debug Result</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Fira+Code&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a1a40, #0f0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #eaeaff;
        }

        .debug-card {
            width: 720px;
            padding: 40px;
            background: rgba(20, 20, 45, 0.9);
            border-radius: 26px;
            border: 1px solid rgba(255, 90, 90, 0.4);
            box-shadow: 0 0 45px rgba(255, 90, 90, 0.25);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #ff5a5a, #ff9a5a);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Markdown Content Styling */
        .markdown-content {
            line-height: 1.7;
            color: #d4d4d4;
            margin-bottom: 30px;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            color: #ff9a5a;
            margin: 20px 0 10px 0;
            font-weight: 600;
        }

        .markdown-content h1 { font-size: 24px; }
        .markdown-content h2 { font-size: 20px; }
        .markdown-content h3 { font-size: 18px; }

        .markdown-content p {
            margin-bottom: 15px;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content code {
            background: rgba(255, 90, 90, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: #ffecec;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }

        .markdown-content pre {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 90, 90, 0.45);
            overflow-x: auto;
            margin: 15px 0;
            box-shadow: inset 0 0 20px rgba(255, 90, 90, 0.15);
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: #ffecec;
            font-size: 14px;
            line-height: 1.6;
        }

        .markdown-content blockquote {
            border-left: 4px solid #ff5a5a;
            padding-left: 15px;
            margin: 15px 0;
            color: #ff9a9a;
            font-style: italic;
        }

        .markdown-content a {
            color: #ff9a5a;
            text-decoration: none;
            transition: 0.3s;
        }

        .markdown-content a:hover {
            text-decoration: underline;
            color: #ff5a5a;
        }

        .markdown-content strong {
            color: #ff9a5a;
            font-weight: 600;
        }

        .markdown-content em {
            color: #ffb8b8;
        }

        .back-link {
            display: block;
            width: 100%;
            text-align: center;
            padding: 14px;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff5a5a, #ff9a5a);
            color: #0f0f1a;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 90, 90, 0.8);
        }
    </style>
</head>

<body>

<div class="debug-card">
    <h2>Debug Result</h2>

    <div class="markdown-content">
        {{ result|safe }}
    </div>

    <a class="back-link" href="/code_ai/debug/">
        Debug Another Code
    </a>
</div>

</body>
</html>
