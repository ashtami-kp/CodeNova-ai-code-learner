<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodeNova | Debug Code</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Fira+Code&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a1a40, #0f0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            color: #eaeaff;
        }

        .debug-card {
            width: 760px;
            padding: 45px;
            background: rgba(20, 20, 45, 0.9);
            border-radius: 28px;
            border: 1px solid rgba(255, 90, 90, 0.4);
            box-shadow: 0 0 45px rgba(255, 90, 90, 0.25);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #ff5a5a, #ff9a5a);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            font-size: 14px;
            color: #b8b8ff;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 90, 90, 0.4);
            background: #0f0f1a;
            color: #ffecec;
            margin-top: 8px;
            outline: none;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        input:focus, textarea:focus {
            box-shadow: 0 0 0 2px rgba(255, 90, 90, 0.6);
        }

        button {
            width: 100%;
            margin-top: 28px;
            padding: 15px;
            border: none;
            border-radius: 32px;
            background: linear-gradient(135deg, #ff5a5a, #ff9a5a);
            color: #0f0f1a;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(255, 90, 90, 0.85);
        }
    </style>
</head>

<body>

<div class="debug-card">
    <h2>Debug & Fix Code</h2>

    <form method="post">
        {% csrf_token %}

        <label>Programming Language</label>
        <input type="text" name="language" placeholder="Python / C / Java" required>

        <br><br>

        <label>Paste Your Code</label>
        <textarea name="code" rows="10" placeholder="Paste your code here..." required></textarea>

        <button type="submit">Analyze & Debug</button>
    </form>
</div>

</body>
</html>
