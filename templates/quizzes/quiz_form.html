<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Quiz</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top, #0a0f2c, #050714);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            overflow: hidden;
            color: #192f83;
        }

        /* Matrix Code Background */
        body::before {
            content: "010101  AI  code  python  while()  { }  if()  neural  debug  ";
            position: absolute;
            inset: 0;
            font-family: monospace;
            font-size: 18px;
            line-height: 1.9;
            color: rgba(106,140,255,0.08);
            animation: matrixScroll 25s linear infinite;
            white-space: pre-wrap;
            pointer-events: none;
        }

        @keyframes matrixScroll {
            from { transform: translateY(-100%); }
            to { transform: translateY(100%); }
        }

        /* Card */
        .quiz-card {
            position: relative;
            background: rgba(15, 22, 60, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 22px;
            padding: 38px 42px;
            width: 750px;
            box-shadow:
                0 0 25px rgba(106,140,255,0.35),
                inset 0 0 20px rgba(155,124,255,0.2);
            animation: fadeInUp 0.8s ease;
            z-index: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #6a8cff, #b084ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(155,124,255,0.6);
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #e1e6e2;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            outline: none;
            margin-top: 6px;
            margin-bottom: 18px;
            background: rgba(255,255,255,0.08);
            color: #e6ebff;
            font-size: 14px;
            box-shadow: inset 0 0 10px rgba(106,140,255,0.2);
        }

        input::placeholder {
            color: #b6b2b7;
        }

        input:focus, select:focus {
            box-shadow:
                0 0 0 2px #6a8cff,
                0 0 18px rgba(106,140,255 ,0.8);
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #6a8cff, #b084ff);
            color: rgb(224, 239, 218);
            font-size: 15px;
            cursor: pointer;
            transition: 0.35s ease;
            box-shadow: 0 0 25px rgba(106,140,255,0.5);
        }

        button:hover {
            transform: scale(1.06);
            box-shadow: 0 0 40px rgba(155,124,255,0.9);
        }
        /* Difficulty Dropdown Styling ONLY */
select[name="difficulty"] {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image:
        linear-gradient(45deg, transparent 50%),
        linear-gradient(135deg, #f3f4ee 50%, transparent 50%);
    background-position:
        0 0,
        calc(100% - 22px) 55%,
        calc(100% - 16px) 55%;
    background-size:
        100% 100%,
        6px 6px,
        6px 6px;
    background-repeat: no-repeat;
    cursor: pointer;
}

/* Dropdown options */
select[name="difficulty"] option {
    background: #070707;
    color: #e6ebff;
    font-weight: 500;
}

/* Individual difficulty colors (supported in most browsers) */
select[name="difficulty"] option[value="easy"] {
    color: #7CFF9B;
}

select[name="difficulty"] option[value="medium"] {
    color: #FFD36A;
}

select[name="difficulty"] option[value="hard"] {
    color: #FF6B6B;
}

/* Hover & selected fallback */
select[name="difficulty"] option:checked {
    background: #4358aa;
    color: #ffffff;
}

    </style>
</head>

<body>

<div class="quiz-card">
    <h2>Generate AI Quiz</h2>

    {% if error %}
    <div style="background: rgba(232, 65, 24, 0.2); border-left: 4px solid #e84118; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; color: #ff9999;">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Quiz Topic</label>
        <input type="text" name="topic" placeholder="Operating System" required>

        <label>Number of Questions</label>
        <input type="number" name="count" min="5" max="20" value="10" required>

        <label>Difficulty Level</label>
        <select name="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
        </select>

        <button type="submit">Generate Quiz</button>
    </form>
</div>

</body>
</html>
