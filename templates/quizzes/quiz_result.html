<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Result</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');

    * {
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        min-height: 100vh;
        margin: 0;
        background: radial-gradient(circle at top, #0a0f2c, #050714);
        display: flex;
        justify-content: center;
        padding: 20px;
        overflow: auto; /* Allow scrolling */
        color: #e6ebff;
    }

    /* Matrix background */
    body::before {
        content: "010101 AI quiz neural code while() if() { } python java C++ ";
        position: fixed; /* Fixed instead of absolute */
        inset: 0;
        font-family: monospace;
        font-size: 18px;
        line-height: 1.8;
        color: rgba(106,140,255,0.08);
        animation: matrixScroll 25s linear infinite;
        white-space: pre-wrap;
        pointer-events: none;
        z-index: 0; /* Keep behind content */
    }

    @keyframes matrixScroll {
        from { transform: translateY(-100%); }
        to { transform: translateY(100%); }
    }

    .result-card {
        position: relative;
        background: rgba(15, 22, 60, 0.7);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 40px 45px;
        max-width: 760px;
        width: 100%;
        box-shadow:
            0 0 40px rgba(106,140,255,0.45),
            inset 0 0 25px rgba(155,124,255,0.25);
        z-index: 1;
        animation: fadeInUp 0.8s ease;
        margin-bottom: 40px; /* spacing at bottom for scrolling */
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h2 {
        text-align: center;
        margin-bottom: 28px;
        font-size: 28px;
        letter-spacing: 1px;
        background: linear-gradient(135deg, #6a8cff, #b084ff);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 18px rgba(155,124,255,0.8);
    }

    /* Difficulty Badge */
    .difficulty-badge {
        display: inline-block;
        margin-left: 12px;
        padding: 5px 14px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 16px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #fff;
        box-shadow: 0 0 8px rgba(106,140,255,0.6), 0 0 15px rgba(155,124,255,0.4);
        animation: neonPulse 2s ease-in-out infinite alternate;
    }

    @keyframes neonPulse {
        0% { box-shadow: 0 0 10px rgba(106,140,255,0.6), 0 0 20px rgba(155,124,255,0.5); transform: scale(1); }
        50% { box-shadow: 0 0 18px rgba(106,140,255,0.9), 0 0 30px rgba(155,124,255,0.7); transform: scale(1.05); }
        100% { box-shadow: 0 0 10px rgba(106,140,255,0.6), 0 0 20px rgba(155,124,255,0.5); transform: scale(1); }
    }

    .difficulty-badge.easy {
        background: linear-gradient(45deg, #2ecc71, #4cd137);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .difficulty-badge.medium {
        background: linear-gradient(45deg, #f1c40f, #f39c12);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .difficulty-badge.hard {
        background: linear-gradient(45deg, #e84118, #c23616);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .quiz-content {
        background: rgba(255,255,255,0.08);
        padding: 24px;
        border-radius: 18px;
        overflow-x: auto;
        line-height: 1.75;
        box-shadow: inset 0 0 15px rgba(106,140,255,0.25);
        transition: box-shadow 0.35s ease;
    }

    .quiz-content:hover {
        box-shadow: inset 0 0 25px rgba(106,140,255,0.4), 0 0 20px rgba(155,124,255,0.3);
    }

    .quiz-content h3,
    .quiz-content h4 {
        color: #b6c2ff;
    }

    .quiz-content p,
    .quiz-content li {
        color: #e6ebff;
        font-size: 14px;
    }

    .back-link {
        display: block;
        text-align: center;
        text-decoration: none;
        padding: 14px;
        border-radius: 30px;
        background: linear-gradient(135deg, #6a8cff, #b084ff);
        color: white;
        font-size: 14px;
        margin-top: 28px;
        transition: 0.35s ease;
        box-shadow: 0 0 25px rgba(106,140,255,0.5);
    }

    .back-link:hover {
        transform: scale(1.06);
        box-shadow: 0 0 40px rgba(155,124,255,0.9);
    }
</style>

</head>

<body>

<div class="result-card">
    {% if topic and quiz %}
        <h2>
            Quiz on "{{ topic }}"
            <span class="difficulty-badge {{ difficulty|lower }}">{{ difficulty|default:"Medium"|title }}</span>
        </h2>

        <div class="quiz-content">
            {{ quiz|safe }}
        </div>
    {% else %}
        <h2 style="color: #ff9999;">Error Loading Quiz</h2>
        <div class="quiz-content" style="background: rgba(232, 65, 24, 0.15); border-left: 4px solid #e84118;">
            <p>The quiz could not be displayed. Please go back and try generating the quiz again.</p>
        </div>
    {% endif %}

    <a class="back-link" href="{% url 'quiz' %}">Generate Another Quiz</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>

</body>
</html>
